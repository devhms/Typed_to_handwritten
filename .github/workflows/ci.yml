name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: |
          python -m ruff check \
            notebook_renderer.py \
            phase3_degradation.py \
            phase4_telemetry.py \
            run_pipeline.py \
            server.py \
            tools/ocr_benchmark.py \
            tools/ocr_technique_sweep.py \
            tests

      - name: Unit tests
        run: |
          python -m pytest -q tests/test_top_clipping_regression.py tests/test_render_api_compat.py tests/test_pipeline_cli.py tests/test_ocr_benchmark_stats.py

      - name: Pipeline smoke (headless)
        run: |
          python run_pipeline.py --headless --severity mild
