<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentic — Pro Handwritten Creator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #6366f1;
            --brand-glow: rgba(99, 102, 241, 0.4);
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 2rem;
            align-items: start;
        }

        .panel {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .label {
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--brand);
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 99px;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            font-size: 0.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-pill.syncing {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        textarea {
            width: 100%;
            height: 550px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 4px var(--brand-glow);
        }

        .preview-area {
            position: relative;
            background: #000;
            border-radius: 16px;
            height: 650px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        #previewImg {
            max-width: 95%;
            max-height: 95%;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }

        #previewImg.loaded {
            opacity: 1;
        }

        .loader {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--brand);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
        }

        button {
            background: var(--brand);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px var(--brand-glow);
        }

        button.outline {
            background: transparent;
            border: 1px solid var(--border);
        }

        footer {
            margin-top: 4rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.875rem;
        }

        .sync-dot {
            width: 6px;
            height: 6px;
            background: currentColor;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    </style>
</head>
<body>

    <div id="app">
        <header>
            <div class="logo">AUTHENTIC</div>
            <p class="subtitle">100% Photorealistic Assignment Generator</p>
        </header>

        <main class="grid">
            <!-- Left: Editor -->
            <section class="panel">
                <div class="panel-header">
                    <span class="label">Live Editor</span>
                    <div id="syncStatus" class="status-pill">
                        <div class="sync-dot"></div>
                        <span>SYNCED</span>
                    </div>
                </div>
                <textarea id="editor" spellcheck="false">History Assignment: The Industrial Revolution

The Industrial Revolution marked a major turning point in history. It began in the late 18th century in Great Britain and fundamentally changed how people lived and worked.

Before the revolution, most goods were made by hand in small workshops or at home. The introduction of steam power and new machinery allowed for mass production in large factories.</textarea>
                
                <div class="controls">
                    <button id="exportBtn">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                        EXPORT 4K PHOTO
                    </button>
                    <button class="outline" onclick="location.reload()">REFRESH ASSETS</button>
                </div>
            </section>

            <!-- Right: Preview -->
            <section class="panel">
                <div class="panel-header">
                    <span class="label">Real-Time Preview</span>
                    <span class="status-pill" style="background: rgba(255,255,255,0.1); color: #fff;">300 DPI</span>
                </div>
                <div class="preview-area">
                    <div id="loader" class="loader"></div>
                    <img id="previewImg" src="/assignments/v_sync_raw.png" alt="Handwritten Preview">
                </div>
                <p class="subtitle" style="font-size: 0.8rem; text-align: center; margin-top: 1rem;">
                    Proprietary "Human Error" baseline alignment active.
                </p>
            </section>
        </main>

        <footer>
            &copy; 2026 Antigravity Labs &bull; Professional Edition
        </footer>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const previewImg = document.getElementById('previewImg');
        const syncStatus = document.getElementById('syncStatus');
        const loader = document.getElementById('loader');
        const exportBtn = document.getElementById('exportBtn');

        let debounceTimer;

        // Add 'loaded' class when image is loaded for fade-in
        previewImg.onload = () => {
            previewImg.classList.add('loaded');
            loader.style.display = 'none';
        };

        // Real-Time Sync Logic
        editor.addEventListener('input', () => {
            setSyncStatus('syncing', 'SYNCING...');
            clearTimeout(debounceTimer);
            
            debounceTimer = setTimeout(() => {
                generatePreview(true);
            }, 800);
        });

        // Export Button (Heavy Mode)
        exportBtn.addEventListener('click', () => {
            generatePreview(false);
        });

        async function generatePreview(isFast) {
            loader.style.display = 'block';
            previewImg.classList.remove('loaded');

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: editor.value,
                        title: editor.value.split('\n')[0] || 'Assignment',
                        fast: isFast
                    })
                });

                const data = await response.json();
                if (data.success) {
                    // Cache bust with timestamp
                    previewImg.src = data.image_url;
                    setSyncStatus('synced', 'SYNCED');
                }
            } catch (err) {
                console.error("Sync Error:", err);
                setSyncStatus('error', 'SYNC ERROR');
            }
        }

        function setSyncStatus(type, label) {
            syncStatus.className = 'status-pill ' + type;
            syncStatus.querySelector('span').innerText = label;
        }

        // Initial Load
        generatePreview(true);

    </script>
</body>
</html>
